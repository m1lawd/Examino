<!doctype html>
<html lang="fa" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./styles/sign-up.css" />
    <title>ثبت نام</title>
  </head>
  <body>
    <button class="btn" id="back">بازگشت</button>

    <div class="form-container">
      <div class="form-section">
        <h2 class="section-title">اطلاعات فردی</h2>
        <div class="personal-info">
          <div class="input-wrapper">
            <input type="text" id="name" required />
            <label for="name">نام و نام خانوادگی</label>
          </div>

          <div class="input-wrapper">
            <input type="text" id="phone-number" required />
            <label for="phone-number">تلفن تماس</label>
          </div>
        </div>
      </div>

      <div class="form-section">
        <h2 class="section-title">اطلاعات آموزشگاه</h2>
        <div class="school-info">
          <div class="input-wrapper">
            <input type="text" id="school-name" required />
            <label for="school-name">نام آموزشگاه</label>
          </div>

          <div class="input-wrapper">
            <input type="text" id="school-code" required />
            <label for="school-code">کد آموزشگاه</label>
          </div>
        </div>
      </div>
    </div>
    <script src="scripts/btn.js"></script>
  </body>
</html>
