<!doctype html>
<html lang="fa" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="styles/home.css" />
    <link rel="stylesheet" href="styles/home-shapes.css" />
    <title>Examino | اگزمینو</title>
  </head>
  <body>
    <img src="assets/WTF.jpg" class="shape" id="wtf" />
    <img src="assets/WTF-2.png" class="shape" id="wtf-2" />
    <img src="assets/Arrows.jpg" class="shape" id="arrow-1" />
    <img src="assets/Arrows.jpg" class="shape" id="arrow-2" />
    <img src="assets/Circles.png" class="shape" id="circles" />
    <img src="assets/Circles-dark.png" class="shape" id="circles-dark" />
    <img src="assets/Arrows-dark.png" class="shape" id="arrow-dark" />
    <img src="assets/WTF-3.png" class="shape" id="wtf-3" />

    <section class="land" id="land">
      <div class="main">
        <div class="main-content">
          <div class="main-text">
            <p class="discription">سامانه آزمون آنلاین</p>
            <h1 class="title">Examino</h1>
          </div>
          <div class="btns">
            <button class="btn" id="sign-in">ثبت نام</button>
            <button class="btn" id="log-in">ورود</button>
          </div>
        </div>
        <img
          class="hero-illustration"
          src="assets/Hero-Illustration.png"
          alt="exam-illustraion" />
      </div>
      <img src="assets/Mouse.png" alt="Mouse" class="mouse-icon" />
    </section>
    <section class="about" id="about">
      <div class="about-box">
        <!-- کانتینر اسلایدها -->
        <div class="slider-wrapper">
          <div class="slides-track">
            <!-- اسلاید ۱ -->
            <div class="slide">
              <div class="slide-image">
                <!-- عکس خودت رو اینجا بذار -->
                <img src="assets/a1.png" alt="اسلاید ۱" />
              </div>
              <div class="slide-content">
                <h2>عنوان اسلاید اول</h2>
                <p>
                  اینجا متن توضیحات مربوط به اسلاید اول قرار می‌گیره. می‌تونی هر
                  متنی که دوست داری بنویسی.
                </p>
              </div>
            </div>

            <!-- اسلاید ۲ -->
            <div class="slide">
              <div class="slide-image">
                <img src="assets/a2.png" alt="اسلاید ۲" />
              </div>
              <div class="slide-content">
                <h2>عنوان اسلاید دوم</h2>
                <p>
                  متن اسلاید دوم. این بخش می‌تونه شامل جزئیات بیشتر یا ویژگی‌های
                  خاص باشه.
                </p>
              </div>
            </div>

            <!-- اسلاید ۳ -->
            <div class="slide">
              <div class="slide-image">
                <img src="assets/a3.png" alt="اسلاید ۳" />
              </div>
              <div class="slide-content">
                <h2>عنوان اسلاید سوم</h2>
                <p>متن اسلاید سوم. امیدوارم از این اسلایدر خوشت بیاد!</p>
              </div>
            </div>
          </div>
        </div>

        <!-- نشانگرهای پایین (Dots) -->
        <div class="dots-container">
          <span class="dot active" onclick="currentSlide(1)"></span>
          <span class="dot" onclick="currentSlide(2)"></span>
          <span class="dot" onclick="currentSlide(3)"></span>
        </div>
      </div>
    </section>

    <footer class="footer"></footer>
    <body>
      <script src="scripts/btn.js"></script>
      <script src="scripts/slider.js"></script>
    </body>
  </body>
</html>
